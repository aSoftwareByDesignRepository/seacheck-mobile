// F-Droid Gradle init script: align Kotlin JVM target with Java 21 (RN 0.85 / Expo SDK 56).
// No Kotlin imports — init scripts compile before the Kotlin Gradle plugin is on the classpath.
allprojects {
    tasks.configureEach { t ->
        if (t.class.name.contains('KotlinCompile')) {
            try {
                t.kotlinOptions {
                    jvmTarget = '21'
                    freeCompilerArgs += '-Xskip-metadata-version-check'
                }
            } catch (Exception ignored) {
                try {
                    def jvmTarget = Class.forName('org.jetbrains.kotlin.gradle.dsl.JvmTarget')
                        .enumConstants.find { it.name() == 'JVM_21' }
                    t.compilerOptions.jvmTarget.set(jvmTarget)
                    t.compilerOptions.freeCompilerArgs.add('-Xskip-metadata-version-check')
                } catch (Exception ignored2) {
                    // leave module defaults if neither Kotlin options API is available
                }
            }
        }
    }
}
