Builds:
  - versionName: 0.1.0
    versionCode: 1
    commit: COMMIT_PLACEHOLDER
    sudo:
      - apt-get update
      - apt-get install -y npm
    init: npm ci
    output: android/app/build/outputs/apk/release/app-armeabi-v7a-release-unsigned.apk
    srclibs:
      - firebase-stub@ce90a956aacda17a85c60577ee443aeb83d876ef
    prebuild:
      - sed -i -e '1a "expo":{"autolinking":{"android":{"buildFromSource":[".*"]}}},' package.json
      - sed -i '/jvmToolchain\|JavaVersion/s/17/21/' node_modules/@react-native/gradle-plugin/*/build.gradle.kts
        node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
      - sed -i -e '/installReferrerVersion/,+12d' node_modules/react-native-device-info/android/build.gradle
      - sed -i -e '/installreferrer/d' node_modules/expo-application/android/build.gradle
      - sed -i -e '/com.android.installreferrer.api/d' -e '/StringBuilder()/,/^ })/d'
        -e '/getInstallReferrerAsync/apromise.resolve("")'
        node_modules/expo-application/android/src/main/java/expo/modules/application/ApplicationModule.kt
      - sed -i -e '/firebase/d' node_modules/expo-notifications/android/build.gradle
      - cp -a $$firebase-stub$$/firebase-messaging/src node_modules/expo-notifications/android
      - SEACHECK_APP_VARIANT=production npx expo prebuild -p android --clean
      - sed -i -e 's/def enableSeparateBuildPerCPUArchitecture = false/def enableSeparateBuildPerCPUArchitecture = true/'
        android/app/build.gradle
      - sed -i '/reactNativeArchitectures=/d' android/gradle.properties
      - echo 'reactNativeArchitectures=armeabi-v7a' >> android/gradle.properties
      - sed -i -e '/signingConfig /d' android/app/build.gradle
      - echo 'allprojects { tasks.configureEach { t -> if (t.class.name.contains("KotlinCompile")) { try { t.kotlinOptions.freeCompilerArgs += "-Xskip-metadata-version-check" } catch (Exception e) { try { t.compilerOptions.freeCompilerArgs.add("-Xskip-metadata-version-check") } catch (Exception ex) {} } } } }' > android/init.gradle
    scanignore:
      - node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
      - node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
      - node_modules/expo-modules-autolinking/scripts/android/autolinking_implementation.gradle
      - node_modules/@react-native-async-storage/async-storage/android/build.gradle
      - node_modules/@react-native-community/datetimepicker/android/build.gradle
      - node_modules/@react-native-community/netinfo/android/build.gradle
      - node_modules/@maplibre/maplibre-react-native/android/build.gradle
      - node_modules/react-native-safe-area-context/android/build.gradle
      - node_modules/react-native-screens/android/build.gradle
    scandelete:
      - node_modules
    build: gradle -p android assembleRelease --init-script init.gradle

