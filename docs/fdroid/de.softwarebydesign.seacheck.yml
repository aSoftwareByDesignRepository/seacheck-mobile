AntiFeatures:
  NonFreeNet:
    en-US: Optional online map tiles from OpenStreetMap and CARTO while downloading
      offline region packs.
    de-DE: Optionale Online-Kartenkacheln von OpenStreetMap und CARTO beim Herunterladen
      von Offline-Regionen.
Categories:
  - Navigation
License: AGPL-3.0-or-later
AuthorName: Alexander Mäule
AuthorEmail: info@software-by-design.de
AuthorWebSite: https://nextcloud.software-by-design.de/
WebSite: https://github.com/aSoftwareByDesignRepository/seacheck-mobile
SourceCode: https://github.com/aSoftwareByDesignRepository/seacheck-mobile
